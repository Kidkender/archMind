id: LARAVEL-AUTH-002
entrypoint: "DELETE /tasks/{id}"
framework: laravel
source_project: tenant-workspace-api

retrieval:
  query: "Why are elevated-privilege users blocked from deleting tasks they should be able to delete?"

nodes:
  - id: sanctum
    type: middleware
    symbol: auth:sanctum
    retrieval:
      relevance: LOW
      compressible: true

  - id: resolve_tenant
    type: middleware
    symbol: ResolveTenant::handle
    file: app/Http/Middleware/ResolveTenant.php
    retrieval:
      relevance: LOW
      compressible: true

  - id: check_permission
    type: middleware
    symbol: CheckPermission::handle
    file: app/Http/Middleware/CheckPermission.php
    args: [task.delete]
    retrieval:
      relevance: LOW
      compressible: true

  - id: task_controller_destroy
    type: controller
    symbol: TaskController::destroy
    file: app/Modules/Task/Http/Controllers/TaskController.php
    retrieval:
      relevance: MEDIUM
      compressible: true

  - id: task_policy_delete
    type: policy
    symbol: TaskPolicy::delete
    file: app/Policies/TaskPolicy.php
    retrieval:
      relevance: HIGH
      compressible: false

  - id: perm_task_delete
    type: permission
    symbol: Permission::TASK_DELETE
    file: app/Common/Constants/Permission.php
    privilege_level: basic
    retrieval:
      relevance: HIGH
      compressible: false

  - id: perm_task_delete_any
    type: permission
    symbol: Permission::TASK_DELETE_ANY
    file: app/Common/Constants/Permission.php
    privilege_level: elevated
    retrieval:
      relevance: HIGH
      compressible: false

edges:
  - from: sanctum
    to: resolve_tenant
    relation: next_middleware

  - from: resolve_tenant
    to: check_permission
    relation: next_middleware

  - from: check_permission
    to: task_controller_destroy
    relation: next_middleware

  - from: task_controller_destroy
    to: task_policy_delete
    relation: policy_check
    via: $this->authorize('delete', $task)

  - from: task_policy_delete
    to: perm_task_delete
    relation: checks_permission

  - from: task_policy_delete
    to: perm_task_delete_any
    relation: checks_permission

  - from: perm_task_delete_any
    to: perm_task_delete
    relation: privilege_hierarchy
    description: TASK_DELETE_ANY is elevated above TASK_DELETE

annotations:
  - type: bug
    location: task_policy_delete
    description: >
      Condition for TASK_DELETE_ANY is inverted.
      Current: !hasPermission(TASK_DELETE_ANY) → return true
      Intent:   hasPermission(TASK_DELETE_ANY) → return true
      Effect: users with elevated privilege are MORE restricted than basic users.
    severity: high
    fix: invert the TASK_DELETE_ANY condition in TaskPolicy::delete() line 57
