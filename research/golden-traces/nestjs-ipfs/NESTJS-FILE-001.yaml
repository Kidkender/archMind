id: NESTJS-FILE-001
entrypoint: "POST /ipfs/copy-file"
framework: nestjs
source_project: IPFS-api
adapter_version: "0.2.0"

retrieval:
  query: "Who can copy a file, and is the copy request validated before processing?"

nodes:
  - id: ipfs_controller_copy
    type: ir:business_handler
    symbol: IpfsController::copyFile
    file: src/ipfs/ipfs.controller.ts
    retrieval:
      relevance: HIGH
      compressible: false

  - id: transfer_dto
    type: ir:validation_gate
    symbol: TransferIpfsFileDto
    retrieval:
      relevance: HIGH
      compressible: false

edges:
  - from: ipfs_controller_copy
    to: transfer_dto
    relation: validates

expected_findings:
  - type: missing_authentication
    required_nodes: [ipfs_controller_copy]

expected_top_finding: missing_authentication

annotations:
  - type: security_note
    nodes: [ipfs_controller_copy]
    description: >
      POST /ipfs/copy-file has NO authentication guard — unlike upload-file
      and mutiple-files which use @UseGuards(JwtAuthGuard), copy-file is
      completely unauthenticated. Any anonymous caller can copy files.
      TransferIpfsFileDto validates the request body but provides no
      access control.
